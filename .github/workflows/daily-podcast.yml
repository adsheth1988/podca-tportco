name: Daily Podcast Generation

on:
  schedule:
    # 4:55 PM ET weekdays. ET shifts between UTC-4 (EDT, summer) and UTC-5 (EST, winter).
    # Running both ensures exactly one fires at 4:55 PM regardless of DST.
    # The episode-exists skip in generate-episode.ts makes the off-season trigger a no-op.
    - cron: "55 20 * * 1-5"  # 4:55 PM EDT (summer, UTC-4)
    - cron: "55 21 * * 1-5"  # 4:55 PM EST (winter, UTC-5)
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # needed to commit episode JSON and create releases

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx scripts/generate-episode.ts

      - name: Get episode date (ET)
        id: date
        if: always()  # still needed even if "Run pipeline" partially failed (one podcast down, others OK)
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload MP3s to GitHub Releases
        if: always()
        continue-on-error: true  # never block the commit step — audio upload is best-effort
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=${{ steps.date.outputs.date }}

          upload_one() {
            local SLUG="$1"
            local PREFIX="" TAG="episode-${DATE}"
            if [ "$SLUG" != "qqq" ]; then
              PREFIX="${SLUG}-"
              TAG="episode-${SLUG}-${DATE}"
            fi
            local MP3="public/audio/${PREFIX}${DATE}.mp3"

            if [ ! -f "$MP3" ]; then
              echo "[$SLUG] MP3 not found at $MP3 — skipping (pipeline may have skipped or failed)"
              return 0
            fi

            # Delete existing release + tag if re-running (--cleanup-tag prevents stale tag blocking re-create)
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

            gh release create "$TAG" \
              --title "Episode ${DATE} (${SLUG})" \
              --notes "Daily Podcast — ${SLUG} — ${DATE}" \
              --latest=false

            gh release upload "$TAG" "$MP3" --clobber

            echo "[$SLUG] Uploaded to: https://github.com/${{ github.repository }}/releases/download/${TAG}/${PREFIX}${DATE}.mp3"
          }

          upload_one "qqq"
          upload_one "soxx"
          upload_one "meme"

      - name: Commit episode data
        if: always()  # run even if upload failed — episode JSON is independent of audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "episode: ${{ steps.date.outputs.date }}"
          git push
