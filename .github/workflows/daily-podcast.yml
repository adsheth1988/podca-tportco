name: Daily Podcast Generation

on:
  schedule:
    # 4:45 PM ET weekdays. ET shifts between UTC-4 (EDT, summer) and UTC-5 (EST, winter).
    # Running both ensures one fires at 4:45 PM regardless of DST — the other
    # lands an hour off (early in the off-season, late in-season). The early
    # firing is rejected by generate-episode.ts's own ET time-of-day guard
    # (isAtOrAfterEstTime); the late one is a harmless no-op via the
    # episode-exists skip, since the correct firing already ran by then.
    - cron: "45 20 * * 1-5"  # 4:45 PM EDT (summer, UTC-4)
    - cron: "45 21 * * 1-5"  # 4:45 PM EST (winter, UTC-5)
  workflow_dispatch: # Manual trigger from GitHub UI
    inputs:
      force:
        description: "Bypass the NYSE holiday check (for manual testing)"
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # needed to commit episode JSON and create releases
      issues: write   # needed to open a failure-alert issue if the pipeline breaks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # used to open a failure-alert issue on error
          FORCE_GENERATE: ${{ github.event.inputs.force }}
        run: npx tsx scripts/generate-episode.ts

      - name: Get episode date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload MP3 to GitHub Releases
        continue-on-error: true  # never block the commit step — audio upload is best-effort
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=${{ steps.date.outputs.date }}
          TAG="episode-${DATE}"
          MP3="public/audio/${DATE}.mp3"

          if [ ! -f "$MP3" ]; then
            echo "MP3 not found at $MP3 — pipeline may have skipped (episode already exists)"
            exit 0
          fi

          # Delete existing release + tag if re-running (--cleanup-tag prevents stale tag blocking re-create)
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          gh release create "$TAG" \
            --title "Episode ${DATE}" \
            --notes "QQQ Daily Podcast — ${DATE}" \
            --latest=false

          gh release upload "$TAG" "$MP3" --clobber

          echo "Uploaded to: https://github.com/${{ github.repository }}/releases/download/${TAG}/${DATE}.mp3"

      - name: Commit episode data
        if: always()  # run even if upload failed — episode JSON is independent of audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "episode: ${{ steps.date.outputs.date }}"
          git push
